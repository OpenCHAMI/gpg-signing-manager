name: 'Generate Ephemeral GPG Key'
description: 'Creates an ephemeral GPG key per build and certifies it when imported secret material allows'

inputs:
  subkey-armored:
    description: 'Base64-encoded GPG subkey'
    required: true
  name:
    description: 'Name-Real value for the ephemeral key'
    required: false
    default: 'Ephemeral Key'
  comment:
    description: 'Name-Comment value for the ephemeral key'
    required: false
    default: ''
  email:
    description: 'Name-Email value for the ephemeral key'
    required: false
    default: 'ci@build.local'
  expire:
    description: 'Ephemeral key expiration'
    required: false
    default: '1d'

outputs:
  ephemeral-fingerprint:
    description: 'Fingerprint of the generated ephemeral key'
    value: ${{ steps.fpr.outputs.fingerprint }}
  ephemeral-public-key:
    description: 'Base64-encoded ASCII-armored ephemeral public key'
    value: ${{ steps.export.outputs.pubkey }}
  repo-signing-keyid:
    description: 'Key ID of the imported repo signing key'
    value: ${{ steps.repo_key.outputs.keyid }}
  certification-performed:
    description: 'Whether the ephemeral key was certified by an imported cert-capable secret key'
    value: ${{ steps.sign_ephemeral.outputs.performed }}

runs:
  using: 'composite'
  steps:
    - name: Install GnuPG and RPM tools
      shell: bash
      run: |
        if command -v gpg >/dev/null 2>&1 && command -v rpm >/dev/null 2>&1; then
          exit 0
        fi

        if command -v sudo >/dev/null 2>&1; then
          SUDO=sudo
        else
          SUDO=
        fi

        if command -v apt-get >/dev/null 2>&1; then
          $SUDO apt-get update
          $SUDO apt-get install -y gnupg2 rpm
        elif command -v dnf >/dev/null 2>&1; then
          $SUDO dnf install -y gnupg2 rpm
        else
          echo 'Unsupported package manager: need apt-get or dnf' >&2
          exit 1
        fi

    - name: Import repo subkey
      shell: bash
      run: |
        echo '${{ inputs.subkey-armored }}' | base64 -d > repo-subkey.asc
        gpg --batch --import repo-subkey.asc

    - name: Discover repo signing key
      id: repo_key
      shell: bash
      run: |
        keyid=$(gpg --list-secret-keys --with-colons | awk -F: '($1=="sec" || $1=="ssb") && index($12, "s") { print $5; exit }')
        if [ -z "$keyid" ]; then
          echo 'Could not find imported signing-capable secret key' >&2
          exit 1
        fi
        echo "keyid=${keyid}" >> "$GITHUB_OUTPUT"

    - name: Generate ephemeral key
      shell: bash
      run: |
        gpg --list-secret-keys --with-colons | awk -F: '$1=="fpr" {print $10}' > existing-secret-fingerprints.txt
        cat > keygen.conf <<KEYCONF
        %no-protection
        Key-Type: RSA
        Key-Length: 3072
        Name-Real: ${{ inputs.name }}
        Name-Comment: ${{ inputs.comment }}
        Name-Email: ${{ inputs.email }}
        Expire-Date: ${{ inputs.expire }}
        %commit
        KEYCONF
        gpg --batch --generate-key keygen.conf

    - name: Discover ephemeral fingerprint
      id: fpr
      shell: bash
      run: |
        fpr=$(gpg --list-secret-keys --with-colons | awk -F: '$1=="fpr" {print $10}' | grep -Fxv -f existing-secret-fingerprints.txt | head -n 1)
        if [ -z "$fpr" ]; then
          echo 'Could not determine ephemeral key fingerprint' >&2
          exit 1
        fi
        echo "fingerprint=${fpr}" >> "$GITHUB_OUTPUT"

    - name: Certify ephemeral key when possible
      id: sign_ephemeral
      shell: bash
      run: |
        certify_log=$(mktemp)

        if gpg --batch --yes \
          --local-user '${{ steps.repo_key.outputs.keyid }}' \
          --quick-sign-key '${{ steps.fpr.outputs.fingerprint }}' >"$certify_log" 2>&1; then
          echo 'performed=true' >> "$GITHUB_OUTPUT"
          rm -f "$certify_log"
          exit 0
        fi

        if grep -Eq 'No secret key|Unusable secret key|No primary key' "$certify_log"; then
          cat "$certify_log"
          echo 'Imported secret material cannot certify keys; skipping ephemeral key certification.'
          echo 'performed=false' >> "$GITHUB_OUTPUT"
          rm -f "$certify_log"
          exit 0
        fi

        cat "$certify_log" >&2
        rm -f "$certify_log"
        exit 1

    - name: Export ephemeral public key
      id: export
      shell: bash
      run: |
        gpg --armor --export '${{ steps.fpr.outputs.fingerprint }}' > ephemeral-public.asc
        echo "pubkey=$(base64 < ephemeral-public.asc | tr -d '\n')" >> "$GITHUB_OUTPUT"
